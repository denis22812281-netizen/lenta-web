version: "3.9"

services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lenta
      POSTGRES_USER: lenta
      POSTGRES_PASSWORD: lenta_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lenta"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://lenta:lenta_dev@db:5432/lenta
      APP_DOMAIN: localhost:8000
      APP_URL: http://localhost:8000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://lenta:lenta_dev@db:5432/lenta
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: python worker.py

volumes:
  pg_data:
