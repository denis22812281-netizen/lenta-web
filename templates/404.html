{% extends "base.html" %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center text-center" style="min-height:60vh;gap:12px">

    <h2 class="fw-bold mb-0" style="font-size:48px;color:#FFD200">404</h2>
    <p class="text-muted mb-1" style="font-size:18px">Страница не найдена</p>
