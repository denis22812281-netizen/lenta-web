{% extends "base.html" %}
{% block page_title %}500 — Ошибка сервера{% endblock %}
{% block title %}500{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center text-center" style="min-height:60vh;gap:12px">
    <div style="font-size:72px;line-height:1">⚠️</div>
    <h2 class="fw-bold mb-0" style="font-size:48px;color:#ef4444">500</h2>
    <p class="text-muted mb-1" style="font-size:18px">Внутренняя ошибка сервера</p>
    <p class="text-muted small mb-4">Мы уже знаем о проблеме. Попробуйте обновить страницу через минуту.</p>
    <div class="d-flex gap-2">
        <button data-action="reload" class="btn btn-outline-secondary px-4">
            <i class="bi bi-arrow-clockwise me-2"></i>Обновить
        </button>
        <a href="/" class="btn btn-dark px-4">
            <i class="bi bi-house-fill me-2"></i>На главную
        </a>
    </div>
</div>
{% endblock %}
