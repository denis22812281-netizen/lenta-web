name: CI — Tests

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

jobs:

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff>=0.15.0
      - run: ruff check .

  test-sqlite:
    name: Tests (SQLite)
    runs-on: ubuntu-latest
    needs: [lint]

    env:
      DATABASE_URL: "sqlite:///./test_lenta.db"
      SECRET_KEY: "github-ci-test-key-not-for-production"
      TESTING: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short -x -m "not e2e"

      - name: Cleanup test DB
        if: always()
        run: rm -f test_lenta.db

  test-postgres:
    name: Tests (PostgreSQL)
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lenta_test
          POSTGRES_USER: lenta
          POSTGRES_PASSWORD: lenta_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      DATABASE_URL: "postgresql://lenta:lenta_test@localhost:5432/lenta_test"
      TEST_DATABASE_URL: "postgresql://lenta:lenta_test@localhost:5432/lenta_test"
      SECRET_KEY: "github-ci-test-key-not-for-production"
      TESTING: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests against PostgreSQL
        run: pytest tests/ -v --tb=short -x -m "not e2e"

  e2e:
    name: E2E Browser Tests
    runs-on: ubuntu-latest
    needs: [test-sqlite]

    env:
      DATABASE_URL: "sqlite:///./e2e_test.db"
      SECRET_KEY: "e2e-ci-test-secret-key"
      ADMIN_PHONE: "+79997303914"
      PLAYWRIGHT_BASE_URL: "http://localhost:8000"
      PLAYWRIGHT_PHONE: "+79997303914"
      PLAYWRIGHT_PASSWORD: "test1234"
      SENTRY_DSN: ""
      CLOUDINARY_CLOUD_NAME: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (including playwright)
        run: pip install -r requirements-dev.txt

      - name: Install Chromium
        run: python -m playwright install chromium --with-deps

      - name: Seed E2E test user
        run: python scripts/seed_e2e.py

      - name: Start server in background
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/uvicorn.pid

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/health; then
              echo "Server ready after ${i}s"
              break
            fi
            echo "Waiting... ($i/20)"
            sleep 1
          done

      - name: Run E2E tests
        run: pytest tests/test_e2e_mobile.py -v --tb=short -m e2e

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          kill $(cat /tmp/uvicorn.pid) 2>/dev/null || true
          rm -f e2e_test.db

  load-smoke:
    name: Load Smoke Test
    runs-on: ubuntu-latest
    needs: [test-sqlite]

    env:
      DATABASE_URL: "sqlite:///./load_test.db"
      SECRET_KEY: "load-ci-test-secret-key"
      ADMIN_PHONE: "+79997303914"
      PLAYWRIGHT_PHONE: "+79997303914"
      PLAYWRIGHT_PASSWORD: "test1234"
      SENTRY_DSN: ""
      CLOUDINARY_CLOUD_NAME: ""
      TESTING: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (including locust)
        run: pip install -r requirements-dev.txt

      - name: Seed test user
        run: |
          DATABASE_URL=sqlite:///./load_test.db python scripts/seed_e2e.py

      - name: Start server in background
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/uvicorn.pid

      - name: Wait for server
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/health; then break; fi
            sleep 1
          done

      - name: Run locust smoke (10 users, 30s)
        run: |
          locust -f tests/locustfile.py \
            --host=http://localhost:8000 \
            --headless -u 10 -r 2 --run-time 30s \
            --csv=load_results \
            --exit-code-on-error 1

      - name: Show load test summary
        if: always()
        run: |
          if [ -f load_results_stats.csv ]; then
            echo "=== Load Test Results ==="
            cat load_results_stats.csv
          fi

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: load_results*.csv
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          kill $(cat /tmp/uvicorn.pid) 2>/dev/null || true
          rm -f load_test.db
