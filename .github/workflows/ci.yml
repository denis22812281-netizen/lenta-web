name: CI — Tests

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

jobs:

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff>=0.15.0
      - run: ruff check .

  test-sqlite:
    name: Tests (SQLite)
    runs-on: ubuntu-latest
    needs: [lint]

    env:
      DATABASE_URL: "sqlite:///./test_lenta.db"
      SECRET_KEY: "github-ci-test-key-not-for-production"
      TESTING: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short -x -m "not e2e"

      - name: Cleanup test DB
        if: always()
        run: rm -f test_lenta.db

  test-postgres:
    name: Tests (PostgreSQL)
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lenta_test
          POSTGRES_USER: lenta
          POSTGRES_PASSWORD: lenta_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      DATABASE_URL: "postgresql://lenta:lenta_test@localhost:5432/lenta_test"
      TEST_DATABASE_URL: "postgresql://lenta:lenta_test@localhost:5432/lenta_test"
      SECRET_KEY: "github-ci-test-key-not-for-production"
      TESTING: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests against PostgreSQL
        run: pytest tests/ -v --tb=short -x -m "not e2e"
